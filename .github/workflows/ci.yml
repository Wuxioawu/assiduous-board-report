name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        # These match Settings' hardcoded field defaults (app/core/config.py) -
        # no .env file exists in CI, so Settings() falls back to them directly.
        env:
          POSTGRES_USER: assiduous_user
          POSTGRES_PASSWORD: assiduous
          POSTGRES_DB: assiduous_board_report
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U assiduous_user -d assiduous_board_report"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build
